<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: white;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.4rem;
        }

        .nav-link {
            color: white !important;
            margin-left: 15px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #00f2fe !important;
        }

        /* Page Title */
        .page-title {
            font-size: 3rem;
            font-weight: 700;
            margin-top: 40px;
            text-align: center;
            margin-bottom: 50px;
        }

        /* Book Card */
        .book-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 15px;
            backdrop-filter: blur(10px);
            transition: 0.4s ease;
            height: 100%;
        }

        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .book-img {
            border-radius: 15px;
            height: 250px;
            object-fit: cover;
            width: 100%;
            margin-bottom: 15px;
        }

        .book-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .book-author {
            font-size: 0.9rem;
            color: #ccc;
        }

        .book-meta {
            font-size: 0.85rem;
            margin-top: 5px;
            color: #00f2fe;
        }

        footer {
            margin-top: 80px;
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand" href="#">📚 BookRecommender</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/recommend">Recommend</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h1 class="page-title">🔥 Top 50 Books</h1>

    <div class="row g-4">
        {% for i in range(book_name|length) %}
        <div class="col-lg-3 col-md-4 col-sm-6">
            <div class="book-card">
                <img src="{{ image[i] }}" class="book-img" alt="Book Image">
                <div class="book-title">{{ book_name[i] }}</div>
                <div class="book-author">by {{ author[i] }}</div>
                <div class="book-meta">⭐ Rating: {{ rating[i] }}</div>
                <div class="book-meta">👍 Votes: {{ votes[i] }}</div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<footer>
    © 2026 Book Recommender System | Built with ❤️
</footer>

</body>
</html>
