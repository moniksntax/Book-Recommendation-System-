<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recommend Books</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            min-height: 100vh;
            color: white;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.4rem;
        }

        .nav-link {
            color: white !important;
            margin-left: 15px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #00f2fe !important;
        }

        /* Title */
        .page-title {
            font-size: 3rem;
            font-weight: 700;
            margin-top: 50px;
            text-align: center;
        }

        /* Search Box */
        .search-box {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .form-control {
            border-radius: 50px;
            padding: 15px;
        }

        .btn-search {
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            color: white;
            transition: 0.3s;
        }

        .btn-search:hover {
            transform: scale(1.05);
        }

        /* Book Card */
        .book-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 15px;
            backdrop-filter: blur(10px);
            transition: 0.4s ease;
            height: 100%;
        }

        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .book-img {
            border-radius: 15px;
            height: 250px;
            object-fit: cover;
            width: 100%;
            margin-bottom: 15px;
        }

        .book-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .book-author {
            font-size: 0.9rem;
            color: #ccc;
        }

        footer {
            margin-top: 80px;
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand" href="/">📚 BookRecommender</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="/recommend">Recommend</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
    </div>
</nav>

<div class="container">

    <h1 class="page-title">📖 Find Your Next Favorite Book</h1>

    <!-- Search Section -->
    <div class="search-box text-center">
        <form action="/recommend_books" method="post">
            <div class="input-group mb-3">
                <input name="user_input" type="text" class="form-control" placeholder="Enter a book name..." required>
                <button type="submit" class="btn btn-search">
                    <i class="bi bi-search"></i> Search
                </button>
            </div>
        </form>
    </div>

    {% if data %}
    <div class="row g-4">
        {% for i in data %}
        <div class="col-lg-3 col-md-4 col-sm-6">
            <div class="book-card">
                <img src="{{i[2]}}" class="book-img" alt="Book Image">
                <div class="book-title">{{i[0]}}</div>
                <div class="book-author">by {{i[1]}}</div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}

</div>

<footer>
    © 2026 Book Recommender System | Built with ❤️
</footer>

</body>
</html>
